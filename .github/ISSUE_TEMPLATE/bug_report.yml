name: Bug Report
description: Report a bug or crash with RemapIDs
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the fields below so we can reproduce and fix it.

  - type: dropdown
    id: loader
    attributes:
      label: Mod Loader
      options:
        - Forge 1.20.1
        - Fabric 1.20.1
        - NeoForge 1.21.1
        - Fabric 1.21.1
    validations:
      required: true

  - type: input
    id: mod-version
    attributes:
      label: Mod Version
      description: The version of RemapIDs you're using
      placeholder: e.g. 1.1.1
    validations:
      required: true

  - type: input
    id: log
    attributes:
      label: Crash Log / Error Output
      description: Upload your latest.log to https://mclo.gs and paste the link here
      placeholder: https://mclo.gs/
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: What happened? What did you expect to happen instead?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this bug?
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: other-mods
    attributes:
      label: Other Mods Installed
      description: List any other mods you have installed that may be relevant, and the modpack if you are using one
    validations:
      required: false
