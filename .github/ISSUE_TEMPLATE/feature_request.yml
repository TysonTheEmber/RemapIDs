name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea for RemapIDs? Describe it below!

  - type: textarea
    id: description
    attributes:
      label: Feature Description
      description: What would you like to see added or changed?
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Use Case
      description: Why do you need this? What problem does it solve?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you tried any workarounds or alternative approaches?
    validations:
      required: false

  - type: dropdown
    id: scope
    attributes:
      label: Area
      description: Which part of the mod does this relate to?
      options:
        - Registry Remapping
        - Numerical IDs
        - Configuration
        - Commands
        - Other
    validations:
      required: true
